name: Ticket — In Progress
description: New feature or improvement
title: "[Feature] "
labels:
  - type:feature
  - status:backlog
body:
  - type: markdown
    value: |
      ## Ticket workflow
      1. Add this issue to your **GitHub Project** board
      2. Move to **In Progress** → automation creates branch + draft PR
      3. Merge PR → version bumps from `type:feature` label (minor release)

      You do **not** need `feat:` in commit messages.
  - type: textarea
    id: description
    attributes:
      label: What should we build?
      description: User story, acceptance criteria, screenshots
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: false
