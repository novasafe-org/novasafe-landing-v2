# Gitleaks → Trivy → build → push → deploy (single pipeline)
#
# Env on VPS: /opt/novasafe-deployment/marketing/landing/.env

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  pipeline:
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      packages: write
    uses: novasafe-org/novasafe-deployment/.github/workflows/docker-ci.yml@master
    with:
      app_title: NovaSafe Landing
      repository_name: novasafe-landing-v2
      deploy_service: landing
    secrets: inherit

  dependabot-check:
    name: Dependabot (gitleaks only)
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: novasafe-org/novasafe-deployment/.github/actions/gitleaks-cli@master

  github-release:
    name: GitHub Release
    needs: pipeline
    if: github.event_name == 'push'
    permissions:
      contents: write
    uses: novasafe-org/novasafe-deployment/.github/workflows/publish-github-release.yml@master
    with:
      package-json: package.json
      changelog-path: CHANGELOG.md
