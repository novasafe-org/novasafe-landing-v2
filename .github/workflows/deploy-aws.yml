# Deploy landing site to AWS (S3 + CloudFront)
#
# Parallel deployment path — does NOT replace Docker/Nginx production CI.
# See docs/DEPLOY_AWS.md for configuration instructions.
#
# Prerequisites:
#   1. LandingStack deployed via novasafe-deployment CDK
#   2. Repository Variables: AWS_ROLE_ARN, AWS_REGION (ap-south-1)
#   3. Environment "production" variables: VITE_LANDING_URL, VITE_AUTH_URL, VITE_APP_URL
#   4. ACM certificate validated; DNS pointed at CloudFront

name: Deploy AWS

on:
  workflow_dispatch:

  # TODO: Enable automatic AWS deploys on push to main after cutover is validated.
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    name: Deploy to AWS (production)
    permissions:
      id-token: write
      contents: read
    uses: novasafe-org/novasafe-deployment/.github/workflows/deploy-frontend-aws.yml@master
    with:
      application-name: novasafe-landing-v2
      build-directory: dist
      node-version: '22'
      package-manager: pnpm
      preinstall-script: scripts/sync-feature-flags-catalog.mjs
      github-environment: production
      generate-runtime-config: true
      s3-bucket: novasafe-prod-bucket-landing-793239449172
      cloudfront-distribution-id: E3T09WYDY825ZE

  verify:
    name: Verify production headers
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify CSP allows NovaSafe API
        run: |
          set -euo pipefail
          CSP="$(curl -sSI https://www.novasafe.io/status | tr -d '\r' | awk -F': ' 'tolower($1)=="content-security-policy" {print substr($0,index($0,$2))}')"
          echo "content-security-policy: ${CSP}"
          echo "$CSP" | grep -q "connect-src 'self' https://\\*\\.novasafe\\.io" || {
            echo "::error::CSP must allow connect-src to https://*.novasafe.io (redeploy Landing CDK stack, then invalidate CloudFront)"
            exit 1
          }

      - name: Verify runtime-config.js is JavaScript
        run: |
          set -euo pipefail
          TYPE="$(curl -sSI https://www.novasafe.io/runtime-config.js | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type" {print substr($0,index($0,$2))}')"
          echo "content-type: ${TYPE}"
          echo "$TYPE" | grep -qi 'javascript' || {
            echo "::error::runtime-config.js must be served as JavaScript (run Deploy AWS after generate-runtime-config is enabled)"
            exit 1
          }
