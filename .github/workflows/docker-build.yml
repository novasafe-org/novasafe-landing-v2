# Build & deploy the NovaSafe Landing (novasafe.io) image.
#
# Fresh VPS: first deploy auto-runs initial-setup + first-boot on the server.
#
# Required secrets: SSH_USER, SSH_HOST, SSH_PASSWORD, DEPLOY_PATH

name: Build Landing App

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: "━━━ Build metadata ━━━"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              NovaSafe Landing — Build & Push                 ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo "  Repository  : ${{ github.repository }}"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Image       : ghcr.io/${{ github.repository }}:latest"
          echo "──────────────────────────────────────────────────────────────"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_VERSION=${{ github.sha }}

      - name: "━━━ Build complete ━━━"
        run: echo "  ✔ Image pushed — starting remote deploy (service: landing)..."

  deploy:
    needs: build
    if: success()
    uses: novasafe-org/novasafe-deployment/.github/workflows/deploy-service.yml@master
    with:
      service: landing
      caller_repo: ${{ github.repository }}
      caller_ref: ${{ github.ref_name }}@${{ github.sha }}
    secrets: inherit
