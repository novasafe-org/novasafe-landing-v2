# Build & deploy the NovaSafe Landing (novasafe.io) image.
#
# Static SPA; only public URL pointers and version are baked in.
#
# Required secrets:
#   SSH_USER, SSH_HOST, SSH_PASSWORD, DEPLOY_PATH
#   VITE_LANDING_URL, VITE_AUTH_URL, VITE_APP_URL

name: Build & Deploy Landing

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Public URLs (VITE_LANDING_URL / VITE_AUTH_URL / VITE_APP_URL)
          # live as ENV in the Dockerfile — not as build-args — because
          # they are not secrets and we don't want empty repo secrets to
          # blank them out. See novasafe-landing-v2/Dockerfile for details.
          build-args: |
            VITE_APP_VERSION=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy Landing to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SERVICE_DIR: marketing/landing
          SERVICE_NAME: landing
        run: |
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << EOF
            set -e

            echo "======================================="
            echo "NovaSafe Landing Deployment Started"
            echo "======================================="

            echo "Moving to deployment directory"
            cd ${DEPLOY_PATH}/${SERVICE_DIR}

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in ${SERVICE_DIR}"
              exit 1
            fi

            echo "Detecting docker compose command"
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            echo "Logging into GHCR"
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            echo "Pulling latest image"
            \$DC pull

            echo "Starting service"
            \$DC up -d --remove-orphans

            echo "Container status"
            docker ps --filter name=${SERVICE_NAME}

            echo "Last 50 container logs"
            docker logs --tail 50 novasafe-landing || true

            echo "Cleaning unused images"
            docker image prune -f || true

            echo "======================================="
            echo "Landing Deployment Completed"
            echo "======================================="
          EOF
