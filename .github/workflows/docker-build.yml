# Build & deploy the NovaSafe Landing (novasafe.io) image.
#
# Env/config: set VITE_* in the server .env at
# /opt/novasafe-deployment/marketing/landing/.env (not GitHub secrets).
# Required for status page: VITE_API_URL=https://mobile-api.novasafe.io
#
# Required secrets: SSH_USER, SSH_HOST, SSH_PASSWORD, DEPLOY_PATH

name: Build Landing App

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: "━━━ Build metadata ━━━"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              NovaSafe Landing — Build & Push                 ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo "  Repository  : ${{ github.repository }}"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Image       : ghcr.io/${{ github.repository }}:latest"
          echo "──────────────────────────────────────────────────────────────"

      - name: Checkout code
        uses: actions/checkout@v7

      - id: version
        uses: novasafe-org/novasafe-deployment/.github/actions/resolve-version@master
        with:
          package-json: package.json
          repository-name: novasafe-landing-v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_NUMBER=${{ steps.version.outputs.build }}
            GIT_COMMIT=${{ steps.version.outputs.commit }}
            RELEASED_AT=${{ steps.version.outputs.released_at }}
            GIT_BRANCH=${{ github.ref_name }}
            REPOSITORY=novasafe-landing-v2
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "━━━ Build complete ━━━"
        run: |
          echo "  OK Image pushed to GHCR"
          echo "  OK Starting remote deploy for landing"

  deploy:
    needs: build
    if: success()
    uses: novasafe-org/novasafe-deployment/.github/workflows/deploy-service.yml@master
    with:
      service: landing
      caller_repo: ${{ github.repository }}
      caller_ref: ${{ github.ref_name }}@${{ github.sha }}
    secrets:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_REPO_PATH: ${{ secrets.DEPLOY_REPO_PATH }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
