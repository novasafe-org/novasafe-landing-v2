# NovaSafe Landing — in-container nginx config.
#
# Sits behind the cluster-level reverse proxy (which terminates TLS) and
# serves the static SPA bundle produced by `vite build`. Only the public
# host (novasafe.io / www.novasafe.io) reaches this server — internal
# traffic is name-routed via Docker DNS.

server {
    # Port 3100 is the cluster-wide convention for this service. The
    # outer reverse-proxy nginx terminates TLS on :443 and forwards to
    # `landing:3100` over the shared docker network.
    listen 3100;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Health check (used by Docker HEALTHCHECK and the upstream nginx).
    # Off-log so it doesn't pollute access logs.
    # ------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ------------------------------------------------------------------
    # SEO discovery files — `/sitemap.xml` and `/robots.txt`.
    #
    # Both are emitted as real static files into `public/` by
    # `scripts/generate-seo.mjs` (auto-run by the `prebuild` npm hook),
    # so the existing `try_files $uri $uri/ /index.html;` below picks
    # them up by URI before ever reaching the SPA fallback. The
    # cluster-edge nginx (`infra/opt/novasafe/infra/nginx/conf.d/
    # landing.conf`) owns the explicit content-type pinning and
    # cache-control for these paths so SEO routing is asserted once,
    # at the edge, rather than duplicated per app.
    # ------------------------------------------------------------------

    # ------------------------------------------------------------------
    # Long-lived caching for hashed Vite assets.
    # `assets/` is content-hashed by the build, so we can mark it
    # immutable for a year.
    # ------------------------------------------------------------------
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # SPA fallback — every non-asset path resolves to index.html so
    # client-side routing works on hard refresh / direct deep-links.
    # `index.html` itself is *not* cached, so users always pick up the
    # latest deploy without busting hashed-asset URLs.
    # ------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Hardening headers. The upstream nginx may set its own — these are
    # the per-app baseline. CSP intentionally lives on the upstream
    # since it has full visibility into all subdomains.
    # ------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    server_tokens off;
}
